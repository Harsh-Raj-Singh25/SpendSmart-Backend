server:
    port: ${EXPENSE_SERVICE_PORT:8082}

spring:
    application:
        name: expense-service
    cloud:
        openfeign:
            circuitbreaker:
                enabled: true
            client:
                config:
                    default:
                        connectTimeout: 2000
                        readTimeout: 4000
    datasource:
        url: ${EXPENSE_DB_URL:jdbc:mysql://localhost:3306/spendsmart_expense?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:}
        driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true

    #RabbitMQ
    rabbitmq:
        host: ${RABBITMQ_HOST:localhost}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USERNAME:guest}
        password: ${RABBITMQ_PASSWORD:guest}

eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

springdoc:
  api-docs:
    path: /expenses/v3/api-docs

info:
  app:
    name: "Expense-Service"
    description: "Expense-Service layer for SpendSmart Application"
    version: "1.0.0"
  author:
    name: "Harsh Raj Singh"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# Enable AOP entry-argument debug logs for local debugging; reduce in production
logging:
  level:
    com.spendsmart.expense.aop: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      expenseAuthService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      expenseBudgetService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  retry:
    instances:
      expenseAuthService:
        maxAttempts: 3
        waitDuration: 300ms
      expenseBudgetService:
        maxAttempts: 2
        waitDuration: 300ms

feign:
  circuitbreaker:
    enabled: true

