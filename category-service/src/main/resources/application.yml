server:
  port: ${CATEGORY_SERVICE_PORT:8084}

spring:
  application:
    name: category-service
  datasource:
    # ADDED allowPublicKeyRetrieval=true TO THE END OF THIS LINE
    url: ${CATEGORY_DB_URL:jdbc:mysql://localhost:3306/spendsmart_category?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

#For swagger
#For Swagger
springdoc:
  api-docs:
    path: /categories/v3/api-docs