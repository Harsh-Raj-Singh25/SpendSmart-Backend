server:
  port: ${PAYMENT_SERVICE_PORT:8089}

spring:
  application:
    name: payment-service
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 5000
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:mysql://localhost:3306/spendsmart_payment?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Razorpay API Credentials — replace with your actual keys from https://dashboard.razorpay.com
# Test Mode keys start with "rzp_test_" and "test_secret_"
# NEVER commit production keys to version control!
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_PLACEHOLDER_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET:PLACEHOLDER_KEY_SECRET}

# Subscription pricing — amount in paise (100 paise = 1 INR)
# 100 INR = 10000 paise
subscription:
  amount: ${PREMIUM_MONTHLY_AMOUNT_PAISE:10000}
  currency: ${PREMIUM_CURRENCY:INR}

payment:
  mock-mode: ${PAYMENT_MOCK_MODE:false}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

# For swagger documentation
springdoc:
  api-docs:
    path: /payments/v3/api-docs

info:
  app:
    name: "Payment-Service"
    description: "Payment-Service layer for SpendSmart Application"
    version: "1.0.0"
  author:
    name: "Harsh Raj Singh"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# Enable AOP entry-argument debug logs for local debugging; reduce in production
logging:
  level:
    com.spendsmart.payment.aop: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      paymentAuthService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  retry:
    instances:
      paymentAuthService:
        maxAttempts: 3
        waitDuration: 500ms

feign:
  circuitbreaker:
    enabled: true

