server:
    port: ${NOTIFICATION_SERVICE_PORT:8088}

spring:
    application:
        name: notification-service
    datasource:
        url: ${NOTIFICATION_DB_URL:jdbc:mysql://localhost:3306/spendsmart_notification?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:}

    # ADD THIS BLOCK RIGHT HERE
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect

    mail:
        host: ${SMTP_HOST:smtp.gmail.com}
        port: ${SMTP_PORT:587}
        username: ${SMTP_USERNAME:}
        password: ${SMTP_PASSWORD:}
        properties:
            mail:
                smtp:
                    auth: ${SMTP_AUTH:true}
                    starttls:
                        enable: ${SMTP_STARTTLS_ENABLE:true}

    rabbitmq:
        host: ${RABBITMQ_HOST:localhost}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USERNAME:guest}
        password: ${RABBITMQ_PASSWORD:guest}

eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

#For swagger
#For Swagger
springdoc:
  api-docs:
    path: /notifications/v3/api-docs

info:
  app:
    name: "Notification-Service"
    description: "Notification-Service layer for SpendSmart Application"
    version: "1.0.0"
  author:
    name: "Harsh Raj Singh"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# Enable AOP entry-argument debug logs for local debugging; reduce in production
logging:
  level:
    com.spendsmart.notification.aop: DEBUG

