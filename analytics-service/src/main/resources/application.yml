server:
  port: ${ANALYTICS_SERVICE_PORT:8086}

spring:
  application:
    name: analytics-service
  datasource:
    # ADDED allowPublicKeyRetrieval=true TO THE END OF THIS LINE
    url: ${ANALYTICS_DB_URL:jdbc:mysql://localhost:3306/spendsmart_analytics?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

#For swagger 
springdoc:
  api-docs:
    path: /analytics/v3/api-docs

info:
  app:
    name: "Analytics-Service"
    description: "Analytics-Service layer for SpendSmart Application"
    version: "1.0.0"
  author:
    name: "Harsh Raj Singh"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# Enable AOP entry-argument debug logs for local debugging; reduce in production
logging:
  level:
    com.spendsmart.analytics.aop: DEBUG

