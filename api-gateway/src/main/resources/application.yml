server:
  port: ${API_GATEWAY_PORT:8080}

spring:
  main:
    web-application-type: reactive # Forces Spring to use WebFlux/Netty, ignoring MVC
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors: # Global CORS Configuration (Handles CORS for the whole platform)
        cors-configurations:
          '[/**]':
            allowedOrigins: "${FRONTEND_ORIGIN:http://localhost:4200/}" # allowedOrigins: "${FRONTEND_ORIGIN:https://spend-smart-frontend-ten.vercel.app/}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            
      routes: 
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081} # Where the traffic should go
          predicates:
            - Path=/auth, /auth/**, /oauth2/**, /login/oauth2/** # Added OAuth2 route

        - id: expense-service
          uri: ${EXPENSE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/expenses, /expenses/**
        
        - id: income-service
          uri: ${INCOME_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/incomes, /incomes/**

        - id: category-service
          uri: ${CATEGORY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/categories, /categories/**

        - id: budget-service
          uri: ${BUDGET_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/budgets, /budgets/**

        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/analytics, /analytics/**

        - id: recurring-transaction-service
          uri: ${RECURRING_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/recurring, /recurring/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/notifications, /notifications/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/payments, /payments/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: Expense Service
        url: /expenses/v3/api-docs
      - name: Income Service
        url: /incomes/v3/api-docs
      - name: Category Service
        url: /categories/v3/api-docs
      - name: Budget Service
        url: /budgets/v3/api-docs
      - name: Analytics Service
        url: /analytics/v3/api-docs
      - name: Recurring Transaction Service
        url: /recurring/v3/api-docs
      - name: Notification Service
        url: /notifications/v3/api-docs
      - name: Payment Service
        url: /payments/v3/api-docs

info:
  app:
    name: "Api-Gateway"
    description: "Api-Gateway layer for SpendSmart Application"
    version: "1.0.0"
  author:
    name: "Harsh Raj Singh"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_ENV}

