server:
  port: 8080

spring:
  main:
    web-application-type: reactive # Forces Spring to use WebFlux/Netty, ignoring MVC
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors: # Global CORS Configuration (Handles CORS for the whole platform)
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            
      routes: 
        - id: auth-service
          uri: http://localhost:8081 # Where the traffic should go
          predicates:
            - Path=/auth, /auth/** # What incoming URLs trigger this route

        - id: expense-service
          uri: http://localhost:8082
          predicates:
            - Path=/expenses, /expenses/**
        
        - id: income-service
          uri: http://localhost:8083
          predicates:
            - Path=/incomes, /incomes/**