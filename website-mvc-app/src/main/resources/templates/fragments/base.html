<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${title}">SpendSmart</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

	<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
		<div class="container">
			<a class="navbar-brand" href="/app/dashboard">SpendSmart</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav me-auto">
					<li class="nav-item"><a class="nav-link" href="/app/dashboard">Dashboard</a></li>
					<li class="nav-item"><a class="nav-link" href="/app/expenses">Expenses</a></li>
					<li class="nav-item"><a class="nav-link" href="/app/incomes">Income</a></li>
					<li class="nav-item"><a class="nav-link" href="/app/analytics/charts">Analytics</a></li>
				</ul>
				<ul class="navbar-nav">
					<li class="nav-item">
						<a class="nav-link" href="/app/notifications">
							🔔 <span class="badge bg-danger" id="notif-badge">0</span>
						</a>
					</li>
					<li class="nav-item"><a class="nav-link text-danger" href="/app/logout">Logout</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<script th:fragment="scripts"
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
