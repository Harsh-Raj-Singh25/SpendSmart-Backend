server:
  port: ${WEBSITE_SERVICE_PORT:8090}

spring:
  application:
    name: website-mvc-app
  datasource:
    # ADDED allowPublicKeyRetrieval=true TO THE END OF THIS LINE
    url: ${WEBSITE_DB_URL:jdbc:mysql://localhost:3306/spendsmart_web?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
    client:
      service-url:
        defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}