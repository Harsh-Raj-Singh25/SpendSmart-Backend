server:
  port: ${AUTH_SERVICE_PORT:8081}

spring:
  application:
    name: auth-service
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "${GOOGLE_OAUTH_CLIENT_ID:PLACEHOLDER_CLIENT_ID}"
            client-secret: "${GOOGLE_OAUTH_CLIENT_SECRET:PLACEHOLDER_SECRET}"
            scope:
              - email
              - profile
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/spendsmart_auth?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_ENV}
  expiration: ${JWT_EXPIRATION_MS:86400000}

# Google OAuth2 Client ID - replace with your actual Google Console client ID.
# To get one: https://console.cloud.google.com > APIs & Services > Credentials
# Create an "OAuth 2.0 Client ID" of type "Web application"
google:
  client-id: ${GOOGLE_CLIENT_ID:PLACEHOLDER_GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET:PLACEHOLDER_GOOGLE_CLIENT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

#For Swagger
springdoc:
  api-docs:
    path: /auth/v3/api-docs

# for actuator
# custom info
info:
  app:
    name: "Auth-Service"
    description: "Auth service layer for SpendSmart Application"
    version: "1.0.0"
  author:
    name: "Harsh Raj Singh"

# main actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: "*"  # Exposes everything (health, metrics, beans, env, mappings)
  endpoint:
    health:
      show-details: always # Crucial: This shows you the exact status of MySQL and RabbitMQ!
  info:
    env:
      enabled: true # Allows you to pass custom app info
    java:
      enabled: true # Exposes Java version and vendor details
    os:
      enabled: true # Exposes the Operating System details

# Enable AOP entry-argument debug logs for local debugging; reduce in production
logging:
  level:
    com.spendsmart.auth.aop: DEBUG
